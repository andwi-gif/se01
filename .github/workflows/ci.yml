name: CI

on:
  push:
    branches:
      - main
      - master
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run pytest
        run: pytest

      - name: Run scaffold CLI smoke check
        run: quantum-drift --ensure-dirs
