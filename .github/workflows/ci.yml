name: CI

on:
  push:
    branches:
      - main
      - master
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI_SMOKE_RUN_ID: ci-offline-smoke-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run pytest
        run: pytest

      - name: Run offline smoke workflow
        run: |
          set -euo pipefail
          quantum-drift --ensure-dirs
          quantum-drift --validate-config sample_data/configs/offline_smoke.toml
          quantum-drift --generate-offline sample_data/configs/offline_smoke.toml --run-id "${CI_SMOKE_RUN_ID}"
          quantum-drift --execute-offline sample_data/configs/offline_smoke.toml --run-id "${CI_SMOKE_RUN_ID}"
          quantum-drift --evaluate-offline sample_data/configs/offline_smoke.toml --run-id "${CI_SMOKE_RUN_ID}"
          quantum-drift --summary-run "${CI_SMOKE_RUN_ID}"

      - name: Verify offline smoke artifacts
        run: |
          set -euo pipefail
          run_dir="artifacts/runs/${CI_SMOKE_RUN_ID}"

          test -d "${run_dir}"
          test -f "${run_dir}/generation_results.json"
          test -f "${run_dir}/execution_results.json"
          test -f "${run_dir}/drift_classifications.json"
          test -f "${run_dir}/metrics_by_dimension.json"
          test -f "${run_dir}/run_summary.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = os.environ["CI_SMOKE_RUN_ID"]
          run_dir = Path("artifacts/runs") / run_id
          generation = json.loads((run_dir / "generation_results.json").read_text(encoding="utf-8"))
          execution = json.loads((run_dir / "execution_results.json").read_text(encoding="utf-8"))
          classifications = json.loads((run_dir / "drift_classifications.json").read_text(encoding="utf-8"))
          metrics = json.loads((run_dir / "metrics_by_dimension.json").read_text(encoding="utf-8"))
          summary = json.loads((run_dir / "run_summary.json").read_text(encoding="utf-8"))

          assert generation["run_id"] == run_id
          assert execution["run_id"] == run_id
          assert classifications["run_id"] == run_id
          assert metrics["run_id"] == run_id
          assert summary["run_id"] == run_id
          assert generation["result_count"] > 0
          assert execution["result_count"] == generation["result_count"]
          assert classifications["classification_count"] == execution["result_count"]
          assert summary["attempt_count"] == execution["result_count"]

          first_result = generation["results"][0]
          leaf_dir = (
              run_dir
              / first_result["task_id"]
              / first_result["sdk_version"]
              / first_result["mode"]
          )
          expected_leaf_files = {
              "prompt.txt",
              "generated_code.py",
              "result.json",
              "execution_result.json",
              "drift_classification.json",
          }
          missing = sorted(
              file_name for file_name in expected_leaf_files if not (leaf_dir / file_name).is_file()
          )
          if missing:
              raise AssertionError(f"Missing per-attempt artifacts in {leaf_dir}: {missing}")
          PY
